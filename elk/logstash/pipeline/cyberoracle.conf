input {
  jdbc {
    jdbc_driver_class    => "org.postgresql.Driver"
    jdbc_driver_library  => "/usr/share/logstash/logstash-core/lib/jars/postgresql.jar"
    jdbc_connection_string => "jdbc:postgresql://localhost:5433/cyberoracle"
    jdbc_user            => "postgres"
    jdbc_password        => "postgres"

    # Pull only new rows since last run — uses id as the high-water mark
    statement => "SELECT * FROM logs WHERE id > :sql_last_value ORDER BY id ASC"
    use_column_value     => true
    tracking_column      => "id"
    tracking_column_type => "numeric"

    # Poll every 30 seconds
    schedule => "*/30 * * * * *"

    # Persist the last seen id across Logstash restarts
    last_run_metadata_path => "/usr/share/logstash/data/.logstash_jdbc_last_run"

    lowercase_column_names => true
    jdbc_default_timezone  => "UTC"
  }
}

filter {
  # JDBC delivers created_at as a Java Timestamp object, not a string.
  # Copy it directly to @timestamp via Ruby instead of using the date filter.
  ruby {
    code => 'event.set("@timestamp", event.get("created_at"))'
  }

  # Tag high-risk events for easy Kibana filtering
  if [risk_score] and [risk_score] >= 0.7 {
    mutate { add_tag => ["high_risk"] }
  }

  # Tag blocked/redacted policy decisions
  if [policy_decision] == "block" {
    mutate { add_tag => ["dlp_block"] }
  } else if [policy_decision] == "redact" {
    mutate { add_tag => ["dlp_redact"] }
  }

  # Drop internal Logstash tracking field from the indexed document
  mutate {
    remove_field => ["@version"]
  }
}

output {
  elasticsearch {
    hosts        => ["localhost:9200"]
    # Daily rolling index — keeps data manageable and enables time-based retention
    index        => "cyberoracle-logs-%{+YYYY.MM.dd}"
    # Use the DB primary key as the document id — prevents duplicates on restart
    document_id  => "%{id}"
  }
}
