server {
    listen 80;
    server_name cyberoracle.eng.unt.edu;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name cyberoracle.eng.unt.edu;
    ssl_certificate     /etc/ssl/UNT/certs/cyberoracle_eng_unt_edu.pem;
    ssl_certificate_key /etc/ssl/UNT/private/cyberoracle.eng.unt.edu.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # -----------------------
    # FastAPI backend routes
    # -----------------------
    location /auth/ {
        proxy_pass http://127.0.0.1:8000/auth/;
        include proxy_params;
    }

    location /ai/ {
        proxy_pass http://127.0.0.1:8000/ai/;
        include proxy_params;
    }

    location /logs/ {
        proxy_pass http://127.0.0.1:8000/logs/;
        include proxy_params;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8000/api/;
        include proxy_params;
    }

    location /dlp/ {
        proxy_pass http://127.0.0.1:8000/dlp/;
        include proxy_params;
    }

    location /docs {
        proxy_pass http://127.0.0.1:8000/docs;
        include proxy_params;
    }

    location /openapi.json {
        proxy_pass http://127.0.0.1:8000/openapi.json;
        include proxy_params;
    }

    location /health {
        proxy_pass http://127.0.0.1:8000/health;
        include proxy_params;
    }

    location /ws/ {
        proxy_pass http://127.0.0.1:8000/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        include proxy_params;
    }

    # -----------------------
    # Next.js frontend (catch-all)
    # -----------------------
    location / {
        proxy_pass http://127.0.0.1:3003/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
