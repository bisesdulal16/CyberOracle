name: CyberOracle CI

permissions:
  contents: read
  actions: read
  security-events: write

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: cyberoracle
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Set Environment Variables
        run: |
          echo "PYTEST=1" >> $GITHUB_ENV
          echo "DATABASE_URL=postgresql+asyncpg://postgres:postgres@localhost:5432/cyberoracle" >> $GITHUB_ENV

      - name: Lint with flake8 and black
        run: |
          black --check .
          flake8 .

      - name: Run Tests with Coverage (>=80%)
        env:
          PYTHONPATH: .
          PYTEST: ${{ env.PYTEST }}
        run: |
          pytest --cov=app --cov-fail-under=80 --maxfail=1 --disable-warnings -q
          coverage report -m

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'latest'

      - name: Validate Kubernetes manifests
        run: |
          kubectl apply --dry-run=client -f infra/k8s/cyberoracle-deployment.yaml
          kubectl apply --dry-run=client -f infra/k8s/cyberoracle-service.yaml
