name: CyberOracle CI
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
jobs:
  build-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: cyberoracle
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Set Environment Variables
        run: |
          echo "PYTEST=1" >> $GITHUB_ENV
          echo "DATABASE_URL=postgresql+asyncpg://postgres:postgres@localhost:5432/cyberoracle" >> $GITHUB_ENV
      - name: Lint with flake8 and black
        run: |
          black --check .
          flake8 .
      - name: Run Tests with Coverage (>=80%)
        env:
          PYTHONPATH: .
          PYTEST: ${{ env.PYTEST }}
          DATABASE_URL: ${{ env.DATABASE_URL }}
        run: |
          pytest --cov=app --cov-fail-under=80 --maxfail=1 --disable-warnings -q
          coverage report -m
      - name: Create kind cluster
        uses: helm/kind-action@v1.9.0
        with:
          cluster_name: cyberoracle-ci
      - name: Validate Kubernetes manifests
        run: |
          kubectl cluster-info
          kubectl apply --dry-run=client -f infra/k8s/cyberoracle-deployment.yaml
          kubectl apply --dry-run=client -f infra/k8s/cyberoracle-service.yaml

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install security scanning tools
        run: |
          pip install --upgrade pip
          pip install safety pip-audit

      - name: Safety vulnerability scan
        run: |
          safety check --output text > safety-report.txt || true
        continue-on-error: true

      - name: Upload Safety scan results
        uses: actions/upload-artifact@v4
        with:
          name: safety-scan-results
          path: safety-report.txt
          retention-days: 30

      - name: pip-audit vulnerability scan
        run: |
          pip-audit --format=columns --output=pip-audit-report.txt || true
        continue-on-error: true

      - name: Upload pip-audit scan results
        uses: actions/upload-artifact@v4
        with:
          name: pip-audit-scan-results
          path: pip-audit-report.txt
          retention-days: 30
