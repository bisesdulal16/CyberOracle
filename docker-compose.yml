version: "3.9"

services:
  # PostgreSQL database service
  db:
    image: postgres:16
    container_name: cyberoracle-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cyberoracle 
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  # FastAPI backend service
  api:
    build:
      context: .
      dockerfile: Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/app
    ports:
      - "8000-8010:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/cyberoracle
      - DB_ENCRYPTION_ENABLED=true
      - DB_ENCRYPTION_KEY=${DB_ENCRYPTION_KEY}
      - DB_ENCRYPTION_KEY_ID=${DB_ENCRYPTION_KEY_ID:-v1}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - DEV_USERNAME=${DEV_USERNAME:-developer}
      - DEV_PASSWORD=${DEV_PASSWORD}
      - AUDITOR_USERNAME=${AUDITOR_USERNAME:-auditor}
      - AUDITOR_PASSWORD=${AUDITOR_PASSWORD}
    depends_on:
      - db

  # Grafana monitoring dashboard
  grafana:
    image: grafana/grafana:latest
    container_name: cyberoracle-grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - db
    volumes:
      - grafana_data:/var/lib/grafana  

  # ---------------------------------------------------------------------------
  # ELK Stack — reads from the existing PostgreSQL logs table via JDBC.
  # No changes to the FastAPI app are required.
  # ---------------------------------------------------------------------------

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    container_name: cyberoracle-elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - esdata:/usr/share/elasticsearch/data
      - ./elk/elasticsearch/elasticsearch.yml:/usr/share/elasticsearch/config/elasticsearch.yml:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\\|yellow\"'"]
      interval: 20s
      timeout: 10s
      retries: 5

  logstash:
    build:
      context: ./elk/logstash
      dockerfile: Dockerfile
    container_name: cyberoracle-logstash
    restart: unless-stopped
    volumes:
      - ./elk/logstash/pipeline:/usr/share/logstash/pipeline:ro
      - ./elk/logstash/config/logstash.yml:/usr/share/logstash/config/logstash.yml:ro
      - ./elk/logstash/config/pipelines.yml:/usr/share/logstash/config/pipelines.yml:ro
      - logstash_data:/usr/share/logstash/data
    environment:
      - LS_JAVA_OPTS=-Xms256m -Xmx256m
    network_mode: host
    depends_on:
      elasticsearch:
        condition: service_healthy

  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.0
    container_name: cyberoracle-kibana
    restart: unless-stopped
    ports:
      - "5601:5601"
    volumes:
      - ./elk/kibana/kibana.yml:/usr/share/kibana/config/kibana.yml:ro
    depends_on:
      elasticsearch:
        condition: service_healthy

volumes:
  pgdata:
  grafana_data:
  esdata:
  logstash_data:

networks:
  default:
    driver: bridge
  cyberoracle-4_default:
    external: true
