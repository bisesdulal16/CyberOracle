version: "3.9"

services:
  # PostgreSQL database service
  db:
    image: postgres:16
    #container_name: cyberoracle-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cyberoracle 
    #ports:
     # - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  # FastAPI backend service
  api:
    build:
      context: .
      dockerfile: Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/app
    ports:
      - "8004:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/cyberoracle
      - DB_ENCRYPTION_ENABLED=true
      - DB_ENCRYPTION_KEY=${DB_ENCRYPTION_KEY}
      - DB_ENCRYPTION_KEY_ID=${DB_ENCRYPTION_KEY_ID:-v1}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - DEV_USERNAME=${DEV_USERNAME:-developer}
      - DEV_PASSWORD=${DEV_PASSWORD}
      - AUDITOR_USERNAME=${AUDITOR_USERNAME:-auditor}
      - AUDITOR_PASSWORD=${AUDITOR_PASSWORD}
    depends_on:
      - db

  # Grafana monitoring dashboard
  grafana:
    image: grafana/grafana:latest
   #container_name: cyberoracle-grafana
    restart: unless-stopped
   # ports:
    #  - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - db
    volumes:
      - grafana_data:/var/lib/grafana
      # Grafana provisioning for datasources and dashboards
      - ./infra/monitoring:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards

  nexus:
    image: sonatype/nexus3:3.68.0
    container_name: cyberoracle-nexus
    restart: unless-stopped
    ports:
      # Nexus UI
      - "8081:8081"
      # Docker registry
      - "8083:8083"
    volumes:
      - nexus-data:/nexus-data
    environment:
      - INSTALL4J_ADD_VM_PARAMS=-Xms1200m -Xmx1200m -XX:MaxDirectMemorySize=2g

  prometheus:
    image: prom/prometheus:v2.55.0
    container_name: cyberoracle-prometheus
    restart: unless-stopped
    volumes:
      - ./infra/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - api

  loki:
    image: grafana/loki:2.9.0
    container_name: cyberoracle-loki
    restart: unless-stopped
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./infra/monitoring/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki-data:/loki
    ports:
      - "3100:3100"

  promtail:
    image: grafana/promtail:2.9.0
    container_name: cyberoracle-promtail
    restart: unless-stopped
    command: -config.file=/etc/promtail/promtail-config.yml
    volumes:
      - ./infra/monitoring/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/log:/var/log:ro
    depends_on:
      - loki

  minio:
    image: minio/minio:latest
    container_name: cyberoracle-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  # ---------------------------------------------------------------------------
  # ELK Stack — reads from the existing PostgreSQL logs table via JDBC.
  # No changes to the FastAPI app are required.
  # ---------------------------------------------------------------------------

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    container_name: cyberoracle-elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - esdata:/usr/share/elasticsearch/data
      - ./elk/elasticsearch/elasticsearch.yml:/usr/share/elasticsearch/config/elasticsearch.yml:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\\|yellow\"'"]
      interval: 20s
      timeout: 10s
      retries: 5

  logstash:
    build:
      context: ./elk/logstash
      dockerfile: Dockerfile
    container_name: cyberoracle-logstash
    restart: unless-stopped
    volumes:
      - ./elk/logstash/pipeline:/usr/share/logstash/pipeline:ro
      - ./elk/logstash/config/logstash.yml:/usr/share/logstash/config/logstash.yml:ro
      - ./elk/logstash/config/pipelines.yml:/usr/share/logstash/config/pipelines.yml:ro
      - logstash_data:/usr/share/logstash/data
    environment:
      - LS_JAVA_OPTS=-Xms256m -Xmx256m
    network_mode: host
    depends_on:
      elasticsearch:
        condition: service_healthy

  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.0
    container_name: cyberoracle-kibana
    restart: unless-stopped
    ports:
      - "5601:5601"
    volumes:
      - ./elk/kibana/kibana.yml:/usr/share/kibana/config/kibana.yml:ro
    depends_on:
      elasticsearch:
        condition: service_healthy

volumes:
  pgdata:
  grafana_data:
  nexus-data:
  loki-data:
  minio-data:
  esdata:
  logstash_data:

networks:
  default:
    driver: bridge
  cyberoracle-4_default:
    external: true
