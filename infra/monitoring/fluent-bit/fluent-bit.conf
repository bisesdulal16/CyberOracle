[SERVICE]
    Flush        2
    Daemon       Off
    Log_Level    info
    Parsers_File parsers.conf

# Read CyberOracle API container logs from Docker JSON log files.
[INPUT]
    Name              tail
    Path              /var/lib/docker/containers/*/*-json.log
    Exclude_Path      /var/lib/docker/containers/*cyberoracle-fluent-bit*/*.log
    Parser            docker
    Tag               cyberoracle.raw
    Refresh_Interval  5
    Mem_Buf_Limit     10MB
    Skip_Long_Lines   On
    Read_from_Head    Off
    DB                /tmp/fluent-bit-docker.db

# Keep only logs from the CyberOracle API container.
[FILTER]
    Name   grep
    Match  cyberoracle.raw
    Regex  log (DLP_HIT|AUTH_FAILURE|ERROR|Exception|policy_violation|WARN|failed|denied)

# Parse and label severity/category based on message content.
[FILTER]
    Name   lua
    Match  cyberoracle.raw
    script severity.lua
    call   label_severity

# Send categorized logs to Loki. Grafana can query labels such as severity="high".
[OUTPUT]
    Name        loki
    Match       cyberoracle.raw
    Host        cyberoracle-loki
    Port        3100
    Labels      job=fluent-bit,service=cyberoracle-api,severity=$severity,category=$category
    Line_Format json

# Optional: print locally for demo/debugging.
[OUTPUT]
    Name   stdout
    Match  cyberoracle.raw
